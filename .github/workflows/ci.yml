name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: simple_api_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --requirepass redis_password_123

      - name: Verify database setup
        run: |
          echo "Checking database tables..."
          mysql -h 127.0.0.1 -P 3306 -u root -prootpassword simple_api_test -e "SHOW TABLES;"
          echo "Checking products table structure..."
          mysql -h 127.0.0.1 -P 3306 -u root -prootpassword simple_api_test -e "DESCRIBE products;"

      - name: Prepare test database
        run: |
          # Wait for MySQL to be ready
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -P 3306 -u root -prootpassword -e "SELECT 1" 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 1
          done

          # Create fresh test database
          mysql -h 127.0.0.1 -P 3306 -u root -prootpassword -e "DROP DATABASE IF EXISTS simple_api_test; CREATE DATABASE simple_api_test;"

      - name: Run database migrations
        run: bun run db:migrate
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: simple_api_test
          DB_USER: root
          DB_PASSWORD: rootpassword

      - name: Verify database setup
        run: |
          echo "Checking database tables..."
          mysql -h 127.0.0.1 -P 3306 -u root -prootpassword simple_api_test -e "SHOW TABLES;"
          echo "Checking products table structure..."
          mysql -h 127.0.0.1 -P 3306 -u root -prootpassword simple_api_test -e "DESCRIBE products;"

      - name: Verify Redis connection
        run: |
          echo "Checking Redis connection..."
          # Wait for Redis to be ready
          for i in {1..30}; do
            if docker exec $(docker ps -q --filter ancestor=redis:7-alpine) redis-cli -a prog ping | grep -q "PONG"; then
              echo "✅ Redis is ready and responding"
              break
            fi
            echo "Waiting for Redis... ($i/30)"
            sleep 1
          done

          # Final verification
          if ! docker exec $(docker ps -q --filter ancestor=redis:7-alpine) redis-cli -a prog ping | grep -q "PONG"; then
            echo "❌ Redis connection failed"
            exit 1
          fi

      - name: Run unit tests
        run: bun test --verbose
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: simple_api_test
          DB_USER: root
          DB_PASSWORD: rootpassword
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: redis_password_123

      - name: Start application server
        run: |
          echo "Starting application server..."
          bun run src/index.ts &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

          # Wait for server to be ready
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -f -s http://localhost:3000/test >/dev/null 2>&1; then
              echo "✅ Server is ready on http://localhost:3000"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done

          # Verify server is responding
          if ! curl -f -s http://localhost:3000/test >/dev/null 2>&1; then
            echo "❌ Server failed to start"
            exit 1
          fi

      - name: Run integration tests
        run: bun run test
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: simple_api_test
          DB_USER: root
          DB_PASSWORD: rootpassword
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: redis_password_123

      - name: Stop application server
        run: |
          if [ ! -z "$SERVER_PID" ]; then
            echo "Stopping server (PID: $SERVER_PID)..."
            kill $SERVER_PID 2>/dev/null || true
            sleep 2
            kill -9 $SERVER_PID 2>/dev/null || true
            echo "✅ Server stopped"
          fi

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: |
          echo "Building application..."
          bun run build
          echo "✅ Build completed"

      - name: Run security audit
        run: |
          echo "Running security audit..."
          bun audit || echo "⚠️ Security audit completed with warnings"

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "Deployment steps would go here:"
          echo "- Copy files to staging server"
          echo "- Run database migrations"
          echo "- Restart application services"
          echo "- Run health checks"
          echo "✅ Staging deployment completed (placeholder)"
