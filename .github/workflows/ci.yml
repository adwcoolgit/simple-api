name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

env:
  NODE_ENV: test

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: simple_api_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli -a redis_password_123 ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        command: redis-server --requirepass redis_password_123

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install database clients
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client redis-tools

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -P 3306 -u root -prootpassword -e "SELECT 1" >/dev/null 2>&1; then
              echo "✅ MySQL ready"
              exit 0
            fi

            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

          echo "❌ MySQL failed"
          exit 1

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            if redis-cli -h 127.0.0.1 -p 6379 -a redis_password_123 ping | grep -q PONG; then
              echo "✅ Redis ready"
              exit 0
            fi

            echo "Waiting for Redis... ($i/30)"
            sleep 2
          done

          echo "❌ Redis failed"
          exit 1

      - name: Reset database
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -prootpassword -e "
            DROP DATABASE IF EXISTS simple_api_test;
            CREATE DATABASE simple_api_test;
          "

       - name: Run database migrations
         run: bun run db:migrate
         env:
           DB_HOST: 127.0.0.1
           DB_PORT: 3306
           DB_NAME: simple_api_test
           DB_USER: root
           DB_PASSWORD: rootpassword

      - name: Show database tables
        run: |
          mysql \
            -h 127.0.0.1 \
            -P 3306 \
            -u root \
            -prootpassword \
            simple_api_test \
            -e "SHOW TABLES;"

      - name: Verify inventory table
        run: |
          mysql \
            -h 127.0.0.1 \
            -P 3306 \
            -u root \
            -prootpassword \
            simple_api_test \
            -e "DESCRIBE inventory;"

      - name: Run unit tests
        run: bun test --verbose
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: simple_api_test
          DB_USER: root
          DB_PASSWORD: rootpassword
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: redis_password_123

      - name: Start application server
        run: |
          bun run src/index.ts &

          SERVER_PID=$!

          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

          for i in {1..30}; do
            if curl -f -s http://127.0.0.1:3000/test >/dev/null 2>&1; then
              echo "✅ Server ready"
              exit 0
            fi

            echo "Waiting for server... ($i/30)"
            sleep 2
          done

          echo "❌ Server failed"
          exit 1
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: simple_api_test
          DB_USER: root
          DB_PASSWORD: rootpassword
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: redis_password_123

      - name: Run integration tests
        run: bun run test
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: simple_api_test
          DB_USER: root
          DB_PASSWORD: rootpassword
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: redis_password_123

      - name: Stop application server
        if: always()
        run: |
          if [ ! -z "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
            sleep 2
            kill -9 $SERVER_PID 2>/dev/null || true
          fi

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build

      - name: Run security audit
        run: |
          bun audit || echo "Audit completed with warnings"

      - name: Deploy to staging
        run: |
          echo "🚀 Deploy placeholder"
