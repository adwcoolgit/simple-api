name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: simple_api_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli -a redis_password_123 ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        command: redis-server --requirepass redis_password_123

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client redis-tools curl

      - name: Verify service health
        run: |
          echo "🔍 Checking MySQL connection..."
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -P 3306 -u root -prootpassword -e "SELECT 1" >/dev/null 2>&1; then
              echo "✅ MySQL ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

          echo "🔍 Checking Redis connection..."
          for i in {1..30}; do
            if redis-cli -h 127.0.0.1 -p 6379 -a redis_password_123 ping | grep -q PONG; then
              echo "✅ Redis ready"
              break
            fi
            echo "Waiting for Redis... ($i/30)"
            sleep 2
          done

      - name: Setup test database
        run: |
          echo "🗄️ Setting up test database..."
          mysql -h 127.0.0.1 -P 3306 -u root -prootpassword -e "
            DROP DATABASE IF EXISTS simple_api_test;
            CREATE DATABASE simple_api_test;
          "
          echo "✅ Test database created"

      - name: Generate migrations
        run: bunx drizzle-kit generate
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: simple_api_test
          DB_USER: root
          DB_PASSWORD: rootpassword

      - name: Apply migrations
        run: bun run db:migrate
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: simple_api_test
          DB_USER: root
          DB_PASSWORD: rootpassword

      - name: Verify database setup
        run: |
          echo "🔍 Verifying database tables..."
          TABLES=$(mysql -h 127.0.0.1 -P 3306 -u root -prootpassword simple_api_test -e "SHOW TABLES;" | wc -l)
          if [ "$TABLES" -lt 8 ]; then
            echo "❌ Expected at least 8 tables, found $TABLES"
            mysql -h 127.0.0.1 -P 3306 -u root -prootpassword simple_api_test -e "SHOW TABLES;"
            exit 1
          fi
          echo "✅ All tables created successfully"

          echo "🔍 Verifying product_costs table..."
          mysql -h 127.0.0.1 -P 3306 -u root -prootpassword simple_api_test -e "DESCRIBE product_costs;" > /dev/null
          echo "✅ Product costs table verified"

      - name: Run unit tests
        run: bun test --verbose --timeout 10000
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: simple_api_test
          DB_USER: root
          DB_PASSWORD: rootpassword
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: redis_password_123

      - name: Start application
        run: |
          echo "🚀 Starting application server..."
          bun run src/index.ts &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

          echo "⏳ Waiting for server to be ready..."
          for i in {1..30}; do
            if curl -f -s http://127.0.0.1:3000/health >/dev/null 2>&1; then
              echo "✅ Server ready on http://127.0.0.1:3000"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done

          if ! curl -f -s http://127.0.0.1:3000/health >/dev/null 2>&1; then
            echo "❌ Server failed to start properly"
            exit 1
          fi
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: simple_api_test
          DB_USER: root
          DB_PASSWORD: rootpassword
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: redis_password_123

      - name: Run integration tests
        run: bun run test
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: simple_api_test
          DB_USER: root
          DB_PASSWORD: rootpassword
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: redis_password_123

      - name: Test API endpoints
        run: |
          echo "🔍 Testing API endpoints..."

          # Test health endpoint
          if ! curl -f -s http://127.0.0.1:3000/health >/dev/null 2>&1; then
            echo "❌ Health endpoint failed"
            exit 1
          fi

          # Test OpenAPI documentation
          if ! curl -f -s http://127.0.0.1:3000/openapi >/dev/null 2>&1; then
            echo "❌ OpenAPI endpoint failed"
            exit 1
          fi

          echo "✅ API endpoints working correctly"

      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up..."
          if [ ! -z "$SERVER_PID" ]; then
            echo "Stopping server (PID: $SERVER_PID)..."
            kill $SERVER_PID 2>/dev/null || true
            sleep 2
            kill -9 $SERVER_PID 2>/dev/null || true
          fi
          echo "✅ Cleanup completed"

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build

      - name: Run security audit
        run: |
          echo "🔒 Running security audit..."
          bun audit || echo "⚠️ Security audit completed with warnings"

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "This is a placeholder deployment step."
          echo "In a real scenario, you would:"
          echo "- Copy built files to staging server"
          echo "- Run database migrations"
          echo "- Update environment configuration"
          echo "- Restart application services"
          echo "- Run health checks"
          echo "✅ Staging deployment simulation completed"