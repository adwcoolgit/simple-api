name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: simple_api_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1

    - name: Install dependencies
      run: bun install

    - name: Generate database migrations
      run: bun run db:generate
      env:
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_NAME: simple_api_test
        DB_USER: root
        DB_PASSWORD: rootpassword
        
    - name: Reset database
      run: |
        mysql -h 127.0.0.1 -u root -prootpassword -e "DROP DATABASE IF EXISTS simple_api_test;"
        mysql -h 127.0.0.1 -u root -prootpassword -e "CREATE DATABASE simple_api_test;"

    - name: Run database migrations
      run: bun run db:migrate
      env:
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_NAME: simple_api_test
        DB_USER: root
        DB_PASSWORD: rootpassword

    - name: Run tests
      run: bun test
      env:
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_NAME: simple_api_test
        DB_USER: root
        DB_PASSWORD: rootpassword
        REDIS_HOST: 127.0.0.1
        REDIS_PORT: 6379

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1

    - name: Install dependencies
      run: bun install

    - name: Build application
      run: bun run build

    - name: Deploy to staging
      run: |
        # Add your deployment commands here
        # Example for VPS:
        # scp -r . user@staging-server:/path/to/app
        # ssh user@staging-server 'cd /path/to/app && bun install && bun run start'
        #
        # Example for Railway/Fly.io:
        # Use their CLI or API to deploy
        echo "Deploying to staging environment..."
        # Replace with actual deploy command
